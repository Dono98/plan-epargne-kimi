<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="110" fill="#080d1a"/>
  <rect x="24" y="24" width="464" height="464" rx="90" fill="#0f1726"/>
  <rect x="24" y="24" width="464" height="464" rx="90" fill="url(#grad)" opacity="0.4"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5a0;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#4fa3ff;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <!-- Coin emoji area -->
  <circle cx="256" cy="210" r="130" fill="#00e5a0" opacity="0.12"/>
  <circle cx="256" cy="210" r="105" fill="#00e5a0" opacity="0.15"/>
  <circle cx="256" cy="210" r="85" fill="url(#coinGrad)"/>
  <defs>
    <radialGradient id="coinGrad" cx="40%" cy="35%">
      <stop offset="0%" style="stop-color:#f5c842"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </radialGradient>
  </defs>
  <text x="256" y="248" font-size="90" text-anchor="middle" fill="#080d1a" font-family="Arial" font-weight="900">€</text>
  <!-- Label -->
  <rect x="96" y="360" width="320" height="72" rx="18" fill="#00e5a0"/>
  <text x="256" y="408" font-size="46" text-anchor="middle" fill="#080d1a" font-family="Arial Black, Arial" font-weight="900">50K€</text>
</svg>
